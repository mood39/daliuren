<script>
/* -------------------------
   大六壬可審計運算引擎（已修正版）
   主要改動：
   - mengZhongTiebreak 回傳物件 { cands:[], first, name }
   - refDistribution 非同步分批計算避免 UI 卡死；計算完成後會自動重新 render 當前結果
   - fourCourses 新增 c.kind 屬性以避免文字脆弱檢查
   - scoreChuan 對 jiangPan.map 取值做備援
   ------------------------- */

const BR = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ST = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const EL_NAME = ['木','火','土','金','水'];
const BR_EL = [4,2,0,0,2,1,1,2,3,3,2,4];
const ST_EL = [0,0,1,1,2,2,3,3,4,4];
const sheng = (a,b) => (a+1)%5 === b;
const ke    = (a,b) => (a+2)%5 === b;

const JIGONG = {0:2, 1:4, 2:5, 3:7, 4:5, 5:7, 6:8, 7:10, 8:11, 9:1};
const GONG_STEMS = {2:[0], 4:[1], 5:[2,4], 7:[3,5], 8:[6], 10:[7], 11:[8], 1:[9]};

const YJ_NAME = ['神后','大吉','功曹','太衝','天罡','太乙','勝光','小吉','傳送','從魁','河魁','登明'];

const JIANG = ['貴人','螣蛇','朱雀','六合','勾陳','青龍','天空','白虎','太常','玄武','太陰','天后'];
const JIANG_EL   = [2,1,1,0,2,0,2,3,2,4,3,4];
const JIANG_BASE = [1.5,-1,-1,1,-1,1.5,-0.3,-1.5,1,-1.2,0.3,0.8];

const GUI_DAY   = [1,0,11,11,1,0,1,6,3,3];
const GUI_NIGHT = [7,8,9,9,7,8,7,2,5,5];

const XING = {0:3,3:0, 2:5,5:8,8:2, 1:10,10:7,7:1, 4:4,6:6,9:9,11:11};
const SANHE = [[8,0,4],[2,6,10],[5,9,1],[11,3,7]];
const YIMA = b => ({0:2,4:2,8:2, 2:8,6:8,10:8, 5:11,9:11,1:11, 11:5,3:5,7:5})[b];
const WUHE = s => (s+5)%10;

/* ---------- 曆法 ---------- */
function jdn(y,m,d){
  const a=Math.floor((14-m)/12), y2=y+4800-a, m2=m+12*a-3;
  return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;
}
function solarLon(dateUTCms){
  const jd = dateUTCms/86400000 + 2440587.5;
  const n = jd - 2451545.0;
  const L = (280.460 + 0.9856474*n) % 360;
  const g = ((357.528 + 0.9856003*n) % 360) * Math.PI/180;
  let lam = L + 1.915*Math.sin(g) + 0.020*Math.sin(2*g);
  return ((lam % 360)+360)%360;
}
function monthGeneral(lam){
  const sector = Math.floor((((lam - 330) % 360)+360)%360 / 30);
  return (11 - sector + 12) % 12;
}
function monthBranch(lam){
  const sector = Math.floor((((lam - 315) % 360)+360)%360 / 30);
  return (2 + sector) % 12;
}
function dayGanzhi(y,m,d,hour,lateZi){
  let J = jdn(y,m,d);
  if(lateZi && hour >= 23) J += 1;
  const idx = ((J + 49) % 60 + 60) % 60;
  return {idx, stem: idx%10, branch: idx%12};
}
const hourBranch = h => Math.floor(((h+1)%24)/2);

/* ---------- 排盤 ---------- */
function buildTianPan(yj, zs){
  const tp = [];
  for(let g=0; g<12; g++) tp[g] = ((yj + g - zs) % 12 + 12) % 12;
  return tp;
}
const groundOf = (tp, sky) => tp.indexOf(sky);

/* ---------- 四課 ---------- */
function fourCourses(dayStem, dayBranch, tp){
  const jg = JIGONG[dayStem];
  const c1 = {up: tp[jg], down: jg, downEl: ST_EL[dayStem], downName: ST[dayStem], label:'一課(干)', kind:'g'};
  const c2 = {up: tp[c1.up], down: c1.up, downEl: BR_EL[c1.up], downName: BR[c1.up], label:'二課(干陰)', kind:'g'};
  const c3 = {up: tp[dayBranch], down: dayBranch, downEl: BR_EL[dayBranch], downName: BR[dayBranch], label:'三課(支)', kind:'b'};
  const c4 = {up: tp[c3.up], down: c3.up, downEl: BR_EL[c3.up], downName: BR[c3.up], label:'四課(支陰)', kind:'b'};
  for(const c of [c1,c2,c3,c4]) c.upEl = BR_EL[c.up];
  return [c1,c2,c3,c4];
}

/* ---------- 涉害計數 ---------- */
function shehaiCount(tp, cand){
  const el = BR_EL[cand];
  const start = groundOf(tp, cand);
  const detail = [];
  let total = 0;
  let g = start;
  while(g !== cand){
    const hits = [];
    if(ke(BR_EL[g], el)) hits.push(BR[g]+'(本氣'+EL_NAME[BR_EL[g]]+')');
    for(const s of (GONG_STEMS[g]||[])) if(ke(ST_EL[s], el)) hits.push(ST[s]+'(寄干'+EL_NAME[ST_EL[s]]+')');
    detail.push({gong: BR[g], hits, n: hits.length});
    total += hits.length;
    g = (g+1)%12;
  }
  return {cand, start, total, detail};
}

/* ---------- 三傳決策樹 ---------- */
function threeTransmissions(ctx){
  const {tp, dayStem, dayBranch, yj, zs} = ctx;
  const jg = JIGONG[dayStem];
  const courses = fourCourses(dayStem, dayBranch, tp);
  const log = [];
  const uniq = [];
  const seen = new Set();
  for(const c of courses){
    const k2 = c.up+'_'+c.down;
    if(!seen.has(k2)){ seen.add(k2); uniq.push(c); }
  }
  log.push(`四課去重後 ${uniq.length} 課。`);
  const chainMidEnd = first => [first, tp[first], tp[tp[first]]];
  const stemParity = dayStem % 2;
  const isYang = stemParity === 0;
  let shehai = null;

  if(yj === zs){
    log.push('月將與占時同位，天地盤重合：伏吟課。');
    let first;
    const zei = uniq.filter(c => ke(c.downEl, c.upEl));
    const shk = uniq.filter(c => ke(c.upEl, c.downEl));
    if(zei.length){ first = zei[0].up; log.push(`課中有下賊上（${zei[0].label}），取 ${BR[first]} 發用。`); }
    else if(shk.length){ first = shk[0].up; log.push(`課中有上剋下（${shk[0].label}），取 ${BR[first]} 發用。`); }
    else { first = isYang ? courses[0].up : courses[2].up; log.push(`無剋：${isYang?'剛日取干上神':'柔日取支上神'} ${BR[first]}。`); }
    let mid;
    const selfXing = b => XING[b] === b;
    if(selfXing(first)){
      mid = (first === courses[0].up) ? courses[2].up : courses[0].up;
      log.push(`初傳 ${BR[first]} 自刑，中傳改取${first===courses[0].up?'支上神':'干上神'} ${BR[mid]}。`);
    } else { mid = XING[first]; log.push(`中傳取初傳所刑：${BR[mid]}。`); }
    let last;
    if(selfXing(mid)){ last = (mid+6)%12; log.push(`中傳 ${BR[mid]} 自刑，末傳取其衝 ${BR[last]}。`); }
    else { last = XING[mid]; log.push(`末傳取中傳所刑：${BR[last]}。`); }
    return {chuan:[first,mid,last], method:'伏吟', courses, log, shehai};
  }

  if((yj+6)%12 === zs){
    log.push('月將與占時相衝，天地盤對衝：返吟課。');
    const res = zeikeFlow(uniq, courses, tp, dayStem, log);
    if(res){
      shehai = res.shehai || null;
      const first = res.first;
      log.push(`中末依天盤遞取：${BR[tp[first]]}、${BR[tp[tp[first]]]}（返吟盤面即互衝循環）。`);
      return {chuan: chainMidEnd(first), method:'返吟('+res.name+')', courses, log, shehai};
    }
    const first = YIMA(dayBranch);
    const mid = courses[2].up, last = courses[0].up;
    log.push(`四課無剋（六仲日）：初取日支驛馬 ${BR[first]}，中取支上神 ${BR[mid]}，末取干上神 ${BR[last]}。`);
    return {chuan:[first,mid,last], method:'返吟(無依)', courses, log, shehai};
  }

  if(jg === dayBranch){
    log.push('干支同位（干寄宮即日支）：八專日，四課僅二課。');
    const zei = uniq.filter(c => ke(c.downEl, c.upEl));
    const shk = uniq.filter(c => ke(c.upEl, c.downEl));
    let first, note;
    if(zei.length || shk.length){
      first = (zei.length?zei:shk)[0].up;
      note = `有剋，取 ${BR[first]} 發用；`;
    } else if(isYang){
      first = (courses[0].up + 2) % 12;
      note = `無剋，剛日自干上神 ${BR[courses[0].up]} 順數三位得 ${BR[first]}；`;
    } else {
      first = (courses[3].up - 2 + 12) % 12;
      note = `無剋，柔日自第四課上神 ${BR[courses[3].up]} 逆數三位得 ${BR[first]}；`;
    }
    log.push(note + `中末俱用干上神 ${BR[courses[0].up]}。`);
    return {chuan:[first, courses[0].up, courses[0].up], method:'八專', courses, log, shehai};
  }

  const res = zeikeFlow(uniq, courses, tp, dayStem, log);
  if(res){
    shehai = res.shehai || null;
    return {chuan: chainMidEnd(res.first), method: res.name, courses, log, shehai};
  }

  const dEl = ST_EL[dayStem];
  const remote = uniq.slice(1);
  let cands = [...new Set(remote.filter(c => ke(c.upEl, dEl)).map(c=>c.up))];
  let rname = '遙剋(蒿矢)';
  if(!cands.length){
    cands = [...new Set(remote.filter(c => ke(dEl, c.upEl)).map(c=>c.up))];
    rname = '遙剋(彈射)';
  }
  if(cands.length){
    log.push(`四課無上下剋，用遙剋：候選 ${cands.map(b=>BR[b]).join('、')}（${rname}）。`);
    let pick = cands;
    if(pick.length > 1){
      const bi = pick.filter(b => b%2 === stemParity);
      if(bi.length === 1){ pick = bi; log.push(`多候選，取與日干俱${isYang?'陽':'陰'}者：${BR[bi[0]]}。`); }
      else {
        const tie = mengZhongTiebreak(pick, tp, courses, isYang, log);
        pick = tie.cands;
        log.push(tie.name || '');
      }
    }
    return {chuan: chainMidEnd(pick[0]), method:rname, courses, log, shehai};
  }

  if(uniq.length === 4){
    log.push('四課全備而無剋無遙：昴星法。');
    let first, mid, last;
    if(isYang){ first = tp[9]; mid = courses[2].up; last = courses[0].up;
      log.push(`剛日（虎視）：初取地盤酉宮上神 ${BR[first]}，中支上、末干上。`);
    } else { first = groundOf(tp, 9); mid = courses[0].up; last = courses[2].up;
      log.push(`柔日（冬蛇掩目）：初取天盤酉所臨地盤 ${BR[first]}，中干上、末支上。`);
    }
    return {chuan:[first,mid,last], method:'昴星', courses, log, shehai};
  }
  log.push('四課不備（三課）而無剋無遙：別責法。');
  let first;
  if(isYang){
    const partner = WUHE(dayStem);
    first = tp[JIGONG[partner]];
    log.push(`剛日：取日干五合之干（${ST[partner]}）寄宮上神 ${BR[first]}。`);
  } else {
    const tri = SANHE.find(t => t.includes(dayBranch));
    first = tri[(tri.indexOf(dayBranch)+1)%3];
    log.push(`柔日：取日支三合之次位 ${BR[first]}。`);
  }
  log.push(`中末俱用干上神 ${BR[courses[0].up]}。`);
  return {chuan:[first, courses[0].up, courses[0].up], method:'別責', courses, log, shehai};
}

/* 賊剋→比用→涉害 共用流程 */
function zeikeFlow(uniq, courses, tp, dayStem, log){
  const zei = uniq.filter(c => ke(c.downEl, c.upEl));
  const pool = zei.length ? zei : uniq.filter(c => ke(c.upEl, c.downEl));
  if(!pool.length) return null;
  const isZei = zei.length > 0;
  let cands = [...new Set(pool.map(c => c.up))];
  log.push(`${isZei?'下賊上':'上剋下'}之課：${pool.map(c=>c.label+' '+BR[c.up]+'/'+c.downName).join('；')}。`);
  if(cands.length === 1){
    log.push(`候選唯一，${BR[cands[0]]} 發用。課體：${isZei?'重審':'元首'}。`);
    return {first: cands[0], name: isZei?'賊剋(重審)':'賊剋(元首)'};
  }
  const p = dayStem % 2;
  const bi = cands.filter(b => b%2 === p);
  if(bi.length === 1){
    log.push(`候選 ${cands.map(b=>BR[b]).join('、')}，取與日干俱${p===0?'陽':'陰'}者 ${BR[bi[0]]} 發用。課體：比用（知一）。`);
    return {first: bi[0], name:'比用(知一)'};
  }
  const shPool = bi.length > 1 ? bi : cands;
  log.push(`俱${bi.length?'比':'不比'}，進入涉害：候選 ${shPool.map(b=>BR[b]).join('、')}，各自涉歷地盤歸本家，逐宮數受剋（本氣＋寄宮干，含出發宮、不含本家）。`);
  const counts = shPool.map(b => shehaiCount(tp, b));
  for(const c of counts){
    log.push(`　${BR[c.cand]}（臨地盤${BR[c.start]}）受剋 ${c.total}：` +
      c.detail.map(d => `${d.gong}宮${d.n?d.hits.join('、'):'—'}`).join('；'));
  }
  const max = Math.max(...counts.map(c=>c.total));
  const top = counts.filter(c=>c.total===max);
  const sorted = [...counts].sort((a,b)=>b.total-a.total);
  const margin = sorted.length>1 ? sorted[0].total - sorted[1].total : null;
  const shehai = {counts, margin};
  if(top.length === 1){
    log.push(`涉害最深者 ${BR[top[0].cand]}（${max} 剋，判定餘裕 ${margin}）發用。課體：涉害。`);
    return {first: top[0].cand, name:'涉害', shehai};
  }
  const isYang = p===0;
  const tie = mengZhongTiebreak(top.map(c=>c.cand), tp, courses, isYang, log);
  return {first: tie.first, name: tie.name || '涉害', shehai};
}

/* 深淺相等之遞補：回傳物件避免在陣列上附屬屬性 */
function mengZhongTiebreak(cands, tp, courses, isYang, log){
  const MENG = [2,5,8,11], ZHONG = [0,3,6,9];
  const onSet = set => cands.filter(b => set.includes(groundOf(tp,b)));
  let m = onSet(MENG);
  if(m.length === 1){ log.push(`深淺相等，取臨地盤四孟者 ${BR[m[0]]}（見機）。`); return {cands:m, first:m[0], name:'涉害(見機)'}; }
  let z = onSet(ZHONG);
  if(z.length === 1){ log.push(`孟上無法分，取臨四仲者 ${BR[z[0]]}（察微）。`); return {cands:z, first:z[0], name:'涉害(察微)'}; }
  const pick = [isYang ? courses[0].up : courses[2].up];
  log.push(`孟仲皆不能分，${isYang?'剛日取干上神':'柔日取支上神'} ${BR[pick[0]]}（綴瑕）。`);
  return {cands: pick, first: pick[0], name:'涉害(綴瑕)'};
}

/* ---------- 天將布盤 ---------- */
function tianJiangPan(dayStem, zs, tp){
  const isDay = zs >= 3 && zs <= 8;
  const gui = isDay ? GUI_DAY[dayStem] : GUI_NIGHT[dayStem];
  const gPos = groundOf(tp, gui);
  const forward = [11,0,1,2,3,4].includes(gPos);
  const map = {};
  for(let k=0;k<12;k++){
    const skyB = ((gui + (forward? k : -k)) % 12 + 12) % 12;
    map[skyB] = k;
  }
  return {map, gui, isDay, forward};
}

/* ---------- 旬遁與空亡 ---------- */
function xunInfo(dayIdx){
  const start = dayIdx - dayIdx%10;
  const sb = start % 12;
  const kong = [(sb+10)%12, (sb+11)%12];
  const dunGan = b => {
    const off = ((b - sb)%12+12)%12;
    return off < 10 ? off : null;
  };
  return {kong, dunGan};
}

/* ---------- 計分 ---------- */
const REL_NAME = {shengWo:'生我(父母)', bihe:'比和(兄弟)', woSheng:'我生(子孫)', woKe:'我剋(妻財)', keWo:'剋我(官鬼)'};
const EVENT_TABLES = {
  '通占': {shengWo:1, bihe:0.5, woSheng:-0.5, woKe:0, keWo:-1},
  '求財': {shengWo:0.5, bihe:-0.5, woSheng:-0.5, woKe:1.5, keWo:-1},
  '官祿': {shengWo:1, bihe:0, woSheng:-1, woKe:0.5, keWo:1.5},
  '婚姻': {shengWo:0.5, bihe:-0.5, woSheng:0, woKe:1, keWo:-0.5},
  '疾病': {shengWo:1.5, bihe:0.5, woSheng:-1, woKe:0, keWo:-2},
  '詞訟': {shengWo:1, bihe:0.5, woSheng:-0.5, woKe:1, keWo:-1.5},
  '行人': {shengWo:1, bihe:0.5, woSheng:-0.5, woKe:0, keWo:-1},
};
const WEIGHTS = [0.45, 0.20, 0.35];

function relToDay(el, dEl){
  if(el === dEl) return 'bihe';
  if(sheng(el, dEl)) return 'shengWo';
  if(sheng(dEl, el)) return 'woSheng';
  if(ke(dEl, el)) return 'woKe';
  return 'keWo';
}
function wangShuai(el, monEl){
  if(el === monEl) return {n:'旺', v:2};
  if(sheng(monEl, el)) return {n:'相', v:1};
  if(sheng(el, monEl)) return {n:'休', v:0};
  if(ke(el, monEl)) return {n:'囚', v:-1};
  return {n:'死', v:-2};
}

function scoreChuan(b, ctx){
  const {tp, dayStem, monEl, jiangPan, eventTable, xun} = ctx;
  const el = BR_EL[b];
  const ws = wangShuai(el, monEl);
  const g = groundOf(tp, b);
  const gEl = BR_EL[g];
  let zd, zdn;
  if(sheng(gEl, el)) {zd=1; zdn='得地盤生';}
  else if(gEl===el)  {zd=0.5; zdn='與地盤比和';}
  else if(ke(el,gEl)){zd=0; zdn='剋地盤';}
  else if(ke(gEl,el)){zd=-1; zdn='受地盤剋';}
  else               {zd=-0.5; zdn='脫氣於地盤';}
  // 天將：加防呆，若 jiangPan.map 未包含該 sky 則 fallback 為 0
  let jIdx = (jiangPan && jiangPan.map) ? jiangPan.map[b] : undefined;
  if(jIdx == null) jIdx = 0;
  const jEl = JIANG_EL[jIdx];
  let base = JIANG_BASE[jIdx], jmul = 1, jnote = '';
  if(ke(jEl, el) && base > 0){ jmul = 0.5; jnote='(吉將剋神，力半)'; }
  if(ke(el, jEl) && base < 0){ jmul = 0.5; jnote='(凶將受制，力半)'; }
  const jv = +(base*jmul).toFixed(2);
  const rel = relToDay(el, ST_EL[dayStem]);
  const gx = eventTable[rel];
  const kong = ctx.xun.kong.includes(b);
  let subtotal = ws.v + zd + jv + gx;
  const rawSub = subtotal;
  if(kong) subtotal = +(subtotal*0.4).toFixed(2);
  return {
    branch:b, el, dun: xun.dunGan(b),
    comps: {
      時令: {v:ws.v, n:ws.n},
      坐地: {v:zd, n:zdn},
      天將: {v:jv, n:JIANG[jIdx]+jnote},
      干繫: {v:gx, n:REL_NAME[rel]},
    },
    jiang: jIdx, kong, rawSub: +rawSub.toFixed(2), subtotal: +subtotal.toFixed(2),
  };
}

function scoreAll(chuan, ctx){
  const per = chuan.map(b => scoreChuan(b, ctx));
  const els = chuan.map(b => BR_EL[b]);
  const dEl = ST_EL[ctx.dayStem];
  const struct = [];
  if(sheng(els[0],els[1]) && sheng(els[1],els[2])) struct.push({n:'三傳遞生', v:1.5});
  if(ke(els[0],els[1]) && ke(els[1],els[2]))       struct.push({n:'三傳遞剋', v:-1.5});
  if(sheng(els[2], dEl)) struct.push({n:'末傳生日干', v:1});
  if(ke(els[2], dEl))    struct.push({n:'末傳剋日干', v:-1});
  const set = [...chuan].sort((a,b)=>a-b).join(',');
  if(SANHE.some(t => [...t].sort((a,b)=>a-b).join(',')===set)) struct.push({n:'三傳成三合局', v:1});
  const structSum = +struct.reduce((s,x)=>s+x.v,0).toFixed(2);
  const weighted = +(per.reduce((s,p,i)=>s+p.subtotal*WEIGHTS[i],0)).toFixed(2);
  const total = +(weighted + structSum).toFixed(2);
  let grade;
  if(total>6) grade='大吉'; else if(total>3) grade='吉'; else if(total>1) grade='小吉';
  else if(total>=-1) grade='平'; else if(total>=-3) grade='小凶'; else if(total>=-6) grade='凶'; else grade='大凶';
  let best={v:0};
  const CH=['初傳','中傳','末傳'];
  per.forEach((p,i)=>{
    for(const [k,c] of Object.entries(p.comps)){
      if(Math.abs(c.v) > Math.abs(best.v)) best={v:c.v, chuan:CH[i], comp:k, note:c.n, branch:BR[p.branch]};
    }
    if(p.kong && Math.abs(p.rawSub)>Math.abs(best.v)*0.8){} 
  });
  const dir = best.v>0?'吉象主要來自':'凶象主要來自';
  const attribution = best.chuan ? `${dir}${best.chuan}${best.branch}之${best.comp}（${best.note}，${best.v>0?'+':''}${best.v}）。` : '各項分值平淡，無顯著主導因素。';
  const kongNote = per.some(p=>p.kong) ? per.map((p,i)=>p.kong?CH[i]+BR[p.branch]:null).filter(Boolean).join('、')+'落旬空，力減（×0.4），事象虛而不實。' : null;
  return {per, struct, structSum, weighted, total, grade, attribution, kongNote};
}

/* ---------- 主入口 computeCourse ---------- */
function computeCourse(input){
  const {y,m,d,hour,minute,eventType,lateZi} = input;
  const dt = new Date(y, m-1, d, hour, minute||0);
  const lam = solarLon(dt.getTime());
  const yj = monthGeneral(lam);
  const monBr = monthBranch(lam);
  const zs = hourBranch(hour);
  const day = dayGanzhi(y,m,d,hour,lateZi);
  const tp = buildTianPan(yj, zs);
  const jiangPan = tianJiangPan(day.stem, zs, tp);
  const xun = xunInfo(day.idx);
  const tt = threeTransmissions({tp, dayStem:day.stem, dayBranch:day.branch, yj, zs});
  const ctx = {tp, dayStem:day.stem, monEl:BR_EL[monBr], jiangPan, eventTable:EVENT_TABLES[eventType]||EVENT_TABLES['通占'], xun};
  const score = scoreAll(tt.chuan, ctx);
  const lamMod = ((lam - 330)%30 + 30)%30;
  const nearBoundary = lamMod < 0.3 || lamMod > 29.7;
  return {input, lam, yj, monBr, zs, day, tp, jiangPan, xun, tt, score, ctx, nearBoundary};
}

/* ---------- 參考分佈（非同步分批計算） ---------- */
const REF_CACHE = {};
const REF_IN_PROGRESS = {};
const REF_ON_READY = {};
let LAST_RESULT = null;

function refDistribution(eventType){
  if(REF_CACHE[eventType]) return REF_CACHE[eventType];
  if(REF_IN_PROGRESS[eventType]) return null;
  REF_IN_PROGRESS[eventType] = true;
  REF_ON_READY[eventType] = REF_ON_READY[eventType] || [];

  // 建立所有組合（17280），但分批計算以免阻塞 UI
  const totals = [];
  const table = EVENT_TABLES[eventType]||EVENT_TABLES['通占'];
  const combos = [];
  for(let yj=0; yj<12; yj++){
    const sector = (11 - yj + 12) % 12;
    const lam0 = (330 + sector*30) % 360;
    const monBrs = [monthBranch((lam0+8)%360), monthBranch((lam0+22)%360)];
    for(const monBr of monBrs) for(let zs=0; zs<12; zs++){
      const tp = buildTianPan(yj, zs);
      for(let idx=0; idx<60; idx++){
        combos.push({yj, monBr, zs, idx});
      }
    }
  }

  let ptr = 0;
  const BATCH = 240;
  function step(){
    const end = Math.min(ptr + BATCH, combos.length);
    for(; ptr < end; ptr++){
      const c = combos[ptr];
      const tp = buildTianPan(c.yj, c.zs);
      const ds = c.idx%10, db = c.idx%12;
      const tt = threeTransmissions({tp, dayStem:ds, dayBranch:db, yj:c.yj, zs:c.zs});
      const ctx = {tp, dayStem:ds, monEl:BR_EL[c.monBr], jiangPan:tianJiangPan(ds, c.zs, tp), eventTable:table, xun:xunInfo(c.idx)};
      totals.push(scoreAll(tt.chuan, ctx).total);
    }
    if(ptr < combos.length) {
      // 將計算切回事件循環，讓 UI 有機會回應
      setTimeout(step, 0);
    } else {
      totals.sort((a,b)=>a-b);
      REF_CACHE[eventType] = totals;
      REF_IN_PROGRESS[eventType] = false;
      const cbs = REF_ON_READY[eventType] || [];
      cbs.forEach(cb => cb(totals));
      // 若當前有未完成的顯示結果且事件類型吻合，重新 render
      if(LAST_RESULT && LAST_RESULT.input && LAST_RESULT.input.eventType === eventType){
        try{ render(LAST_RESULT); }catch(e){ console.warn('重新 render 失敗', e); }
      }
    }
  }
  setTimeout(step, 0);
  return null;
}

/* ---------- UI 與 render ---------- */
const $ = id => document.getElementById(id);
const CH = ['初傳','中傳','末傳'];
const GRID = {5:[0,0],6:[0,1],7:[0,2],8:[0,3],4:[1,0],9:[1,3],3:[2,0],10:[2,3],2:[3,0],1:[3,1],0:[3,2],11:[3,3]};

function fmtV(v){ return (v>0?'+':'')+(+v.toFixed(2)); }
function vCls(v){ return v>0?'pos-v':(v<0?'neg-v':'zero-v'); }

function init(){
  const now = new Date();
  now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  $('dt').value = now.toISOString().slice(0,16);
  $('run').addEventListener('click', run);
  run();
}

function run(){
  const v = $('dt').value;
  if(!v){ return; }
  const [ds, ts] = v.split('T');
  const [y,m,d] = ds.split('-').map(Number);
  const [hh,mm] = ts.split(':').map(Number);
  const r = computeCourse({y,m,d,hour:hh,minute:mm,eventType:$('event').value,lateZi:$('lateZi').checked});
  render(r);
}

function percentileOf(sorted, v){
  let lo=0, hi=sorted.length;
  while(lo<hi){ const m=(lo+hi)>>1; sorted[m] < v-1e-9 ? lo=m+1 : hi=m; }
  let lo2=lo, hi2=sorted.length;
  while(lo2<hi2){ const m=(lo2+hi2)>>1; sorted[m] <= v+1e-9 ? lo2=m+1 : hi2=m; }
  return ((lo + (lo2-lo)/2) / sorted.length) * 100;
}

function render(r){
  LAST_RESULT = r; // 保存以便 background 完成時計算時重新 render
  const res = $('result');
  res.style.display='block';
  res.classList.remove('show'); void res.offsetWidth; res.classList.add('show');

  $('warnbox').innerHTML = r.nearBoundary
    ? '<div class="warn">太陽黃經極接近中氣交接（本引擎為近似計算），月將可能差一位，此刻起課請以精確曆書覆核。</div>' : '';

  const cells = [];
  const hlSet = new Set(r.tt.chuan);
  for(let row=0;row<4;row++) for(let col=0;col<4;col++){
    if(row>=1&&row<=2&&col>=1&&col<=2){
      if(row===1&&col===1){
        cells.push(`<div class="center">
          <div class="dg">${ST[r.day.stem]}${BR[r.day.branch]}日</div>
          <div class="meta">
            <b>${BR[r.yj]}</b>將（${YJ_NAME[r.yj]}）加 <b>${BR[r.zs]}</b>時<br>
            月建${BR[r.monBr]} · ${r.jiangPan.isDay?'晝':'夜'}貴${BR[r.jiangPan.gui]} ${r.jiangPan.forward?'順':'逆'}布<br>
            旬空 <b>${r.xun.kong.map(b=>BR[b]).join('')}</b>
          </div></div>`);
      }
      continue;
    }
    const g = Object.keys(GRID).find(k=>GRID[k][0]===row&&GRID[k][1]===col);
    const gi = +g, sky = r.tp[gi], j = (r.jiangPan.map && r.jiangPan.map[sky]!=null) ? r.jiangPan.map[sky] : 0;
    cells.push(`<div class="cell${hlSet.has(sky)?' hl':''}">
      <div class="jiang">${JIANG[j]}</div>
      <div class="sky el-${BR_EL[sky]}">${BR[sky]}</div>
      <div class="grd">${BR[gi]}</div></div>`);
  }
  $('board').innerHTML = cells.join('');

  $('kes').innerHTML = r.tt.courses.map(c=>`
    <div class="ke">
      <div class="jj">${JIANG[r.jiangPan.map && r.jiangPan.map[c.up]!=null ? r.jiangPan.map[c.up] : 0]}</div>
      <div class="up el-${c.upEl}">${BR[c.up]}</div>
      <div class="dn el-${c.downEl}">${c.downName}</div>
      <div class="lab">${c.label}</div>
    </div>`).join('');

  const sh = r.tt.shehai;
  let mline = `課式循 <b>${r.tt.method}</b> 取用`;
  if(sh && sh.margin!==null){
    const low = sh.margin<=1;
    mline += ` <span class="margin-badge${low?' low':''}">涉害判定餘裕 ${sh.margin}${low?'（餘裕低，取用近於模糊帶，後續判斷宜降置信）':''}</span>`;
  }
  $('methodline').innerHTML = mline;

  $('chuans').innerHTML = r.tt.chuan.map((b,i)=>{
    const p = r.score.per[i];
    const dun = p.dun!==null ? ST[p.dun] : '';
    return `<div class="chuan">
      <div class="pos">${CH[i]}</div>
      <div class="main">
        <span class="b el-${BR_EL[b]}">${dun}${BR[b]}</span>
        <span class="tag">${JIANG[p.jiang]}</span>
        <span class="tag">${p.comps.干繫.n.slice(0,2)}</span>
        ${p.kong?'<span class="tag kong">旬空</span>':''}
      </div>
      <div class="sc ${vCls(p.subtotal)}">${fmtV(p.subtotal)}</div>
    </div>`;
  }).join('');

  $('loglist').innerHTML = r.tt.log.map(l=>`<li>${l}</li>`).join('');

  // 計分展示
  $('scoregrid').innerHTML = r.score.per.map((p,i)=>{
    const rows = Object.entries(p.comps).map(([k,c])=>{
      const w = Math.min(Math.abs(c.v)/2.5*50, 50);
      return `<div class="bar-row">
        <div class="k">${k}</div>
        <div class="bar-track"><div class="bar-fill ${c.v>=0?'p':'n'}" style="width:${w}%"></div></div>
        <div class="note">${c.n} <span class="${vCls(c.v)}">${fmtV(c.v)}</span></div>
      </div>`;
    }).join('');
    return `<div class="chuan-score">
      <div class="cs-head">
        <div class="t">${CH[i]} <b class="el-${BR_EL[p.branch]}">${BR[p.branch]}</b> <span style="color:var(--faint);font-size:12px;">權重 ${WEIGHTS[i]}</span></div>
        <div class="sum ${vCls(p.subtotal)}">${fmtV(p.subtotal)}</div>
      </div>
      ${rows}
      ${p.kong?`<div class="kong-strike">旬空：小計 ${fmtV(p.rawSub)} × 0.4 = ${fmtV(p.subtotal)}</div>`:''}
    </div>`;
  }).join('');

  $('structlist').innerHTML = (r.score.struct.length
    ? r.score.struct.map(s=>`<div>${s.n}<span class="v ${vCls(s.v)}">${fmtV(s.v)}</span></div>`).join('')
    : '<div>無成立之結構格局<span class="v zero-v">0</span></div>')
    + `<div style="border-top:1px dashed var(--hair2); margin-top:6px; padding-top:6px;">三傳加權小計<span class="v ${vCls(r.score.weighted)}">${fmtV(r.score.weighted)}</span></div>`;

  const dist = REF_CACHE[r.input.eventType] || null;
  if(!dist){
    // 若沒有快取，啟動背景計算（若尚未啟動）
    refDistribution(r.input.eventType);
    $('verdict').innerHTML = `
      <div class="seal" role="img" aria-label="判詞：計算中">–</div>
      <div class="vt">
        <div class="total"><b class="zero-v">計算中</b></div>
        <div class="pctl">正在建立本事類下全部可能課式之參考分佈（第一次會稍久），完成後會自動更新結果。</div>
        <div class="attr">${r.score.attribution}</div>
        ${r.score.kongNote?`<div class="kn">${r.score.kongNote}</div>`:''}
      </div>`;
  } else {
    const pct = {p: percentileOf(dist, r.score.total), n: dist.length};
    const g = r.score.grade;
    $('verdict').innerHTML = `
      <div class="seal${g.length===1?' g2':''}" role="img" aria-label="判詞：${g}">${g}</div>
      <div class="vt">
        <div class="total"><b class="${vCls(r.score.total)}">${fmtV(r.score.total)}</b>（切點 ±1／±3／±6 七級）</div>
        <div class="pctl">高於「${r.input.eventType}」全部 <span class="mono">${pct.n.toLocaleString()}</span> 個可能課式中的 <b class="mono">${pct.p.toFixed(1)}%</b><span class="pctl-sub">（模型內百分位，非現實應驗率）</span></div>
        <div class="attr">${r.score.attribution}</div>
        ${r.score.kongNote?`<div class="kn">${r.score.kongNote}</div>`:''}
      </div>`;
  }
}

init();
</script>
